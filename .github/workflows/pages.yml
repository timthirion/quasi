name: Pages deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one deploy may be in flight at a time. A newer push to main
# cancels any in-progress deploy.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build wasm bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (wasm32 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: pages-build

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Build wasm pkg
        run: wasm-pack build --target web --release --out-dir pkg

      - name: Assemble deploy directory
        # The deploy artifact is `deploy/`, which holds:
        #   - the two top-level entry pages (index.html, embed.html)
        #   - the wasm bundle (pkg/quasi.js, quasi_bg.wasm, ...)
        #   - the scene + density-grid data the renderer fetches at runtime
        # Disney-derived `data/grids/disney_*.qvg` are gitignored upstream
        # so they never make it into the deploy artifact.
        run: |
          mkdir -p deploy
          cp index.html embed.html deploy/
          cp -r pkg deploy/pkg
          mkdir -p deploy/data
          cp -r data/gltf deploy/data/gltf
          cp -r data/grids deploy/data/grids
          # `examples/web/` is reserved for future preset entry points.
          if [ -d examples/web ]; then
            mkdir -p deploy/examples
            cp -r examples/web deploy/examples/web
          fi
          ls -la deploy

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
