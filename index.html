<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quasi</title>
    <!-- Empty inline icon so the browser doesn't request /favicon.ico. -->
    <link rel="icon" href="data:," />
    <style>
      html, body { margin: 0; background: #111; color: #ccc; font-family: sans-serif; }
      .row { display: flex; gap: 16px; padding: 16px; flex-wrap: wrap; }
      /* The renderer fills each host element; size is read from these boxes. */
      .quasi { background: #000; }
      #a { width: 480px; height: 480px; }
      #b { width: 300px; height: 300px; }
      /* A resizable box to exercise the ResizeObserver. */
      #c { width: 360px; height: 360px; resize: both; overflow: hidden; border: 1px solid #444; }
      p { padding: 0 16px; }
    </style>
  </head>
  <body>
    <p>Multiple independent Quasi instances on one page. Drag to orbit, scroll to
       zoom. The third box is resizable (drag its bottom-right corner).</p>
    <div class="row">
      <div class="quasi" id="a"></div>
      <div class="quasi" id="b"></div>
      <div class="quasi" id="c"></div>
    </div>

    <script type="module">
      import init, { create } from "./pkg/quasi.js";

      // Keep handles alive for the lifetime of the page.
      const instances = [];
      init().then(async () => {
        for (const id of ["a", "b", "c"]) {
          instances.push(await create(id));
        }
      }).catch(console.error);
    </script>
  </body>
</html>
